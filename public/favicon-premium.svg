<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEAAD" />
      <stop offset="25%" stop-color="#D4A853" />
      <stop offset="75%" stop-color="#9C7726" />
      <stop offset="100%" stop-color="#553f0f" />
    </linearGradient>
    
    <!-- Obsidian Background Gradient -->
    <linearGradient id="dark-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="50%" stop-color="#0A0A0C" />
      <stop offset="100%" stop-color="#020202" />
    </linearGradient>
    
    <!-- Elegant Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.8" />
    </filter>
    
    <!-- Ethereal Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="inner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base Chassis -->
  <rect width="512" height="512" rx="140" fill="url(#dark-bg)" />
  <rect x="2" y="2" width="508" height="508" rx="138" fill="none" stroke="url(#gold-grad)" stroke-width="4" stroke-opacity="0.4" />
  <rect x="12" y="12" width="488" height="488" rx="128" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.05" />

  <!-- Inner Ambient Glow -->
  <circle cx="256" cy="256" r="180" fill="#D4A853" opacity="0.12" filter="url(#glow)" />

  <!-- The Luxury Pulse -->
  <path d="M 110 256 L 190 256 L 240 120 L 310 400 L 355 256 L 402 256" 
        stroke="url(#gold-grad)" 
        stroke-width="48" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#shadow)" />
        
  <!-- Highlighting the peaks (Subtle Diamond shapes instead of circles) -->
  <polygon points="240,105 255,120 240,135 225,120" fill="#FFF2CC" filter="url(#inner-glow)" />
  <polygon points="310,385 325,400 310,415 295,400" fill="#FFF2CC" filter="url(#inner-glow)" />
  
  <!-- Glossy Overlay -->
  <path d="M0 0 L512 0 L512 256 C256 128 0 256 0 512 Z" fill="#ffffff" opacity="0.04" />
</svg>
