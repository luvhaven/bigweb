<svg width="1200" height="300" viewBox="0 0 300 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background container for preview, safe to delete if transparent needed -->
  <rect width="300" height="50" fill="#080706"/>
  <!-- Mark -->
  <g transform="translate(10, 14)">
    <rect x="1" y="1" width="9" height="9" stroke="#D4AF6A" stroke-width="1.5"/>
    <rect x="12" y="1" width="9" height="9" fill="#D4AF6A" opacity="0.8"/>
    <rect x="1" y="12" width="9" height="9" fill="#D4AF6A" opacity="0.4"/>
    <rect x="12" y="12" width="9" height="9" stroke="#D4AF6A" stroke-width="1.5" stroke-dasharray="2 2"/>
  </g>
  <!-- Wordmark -->
  <text x="45" y="32" font-family="'Playfair Display', serif" font-weight="900" font-size="24" fill="#FFFFFF" letter-spacing="-1">BIG</text>
  <text x="92" y="32" font-family="'Playfair Display', serif" font-weight="400" font-size="24" fill="#FFFFFF" letter-spacing="1">WEB</text>
  <text x="160" y="31" font-family="'DM Sans', sans-serif" font-weight="500" font-size="12" fill="#D4AF6A" letter-spacing="3" text-transform="uppercase">Digital</text>
</svg>
